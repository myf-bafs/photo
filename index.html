<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 數學導師 (GLM-4.6V 版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body { 
            font-feature-settings: "cv05", "cv08", "ss01";
            overscroll-behavior-y: contain;
        }
        .katex { font-size: 1.1em !important; }
        .katex-display { 
            padding: 1.5rem;
            margin: 1.2rem 0;
            background: linear-gradient(145deg, #f0f9ff, #e0f2fe);
            border-left: 5px solid #0ea5e9;
            border-radius: 12px;
            overflow-x: auto;
        }
        .question-box {
            background: linear-gradient(to bottom right, #ffffff, #f8fafc);
            border: 1px solid #e2e8f0;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #drawingCanvas { 
            touch-action: none; 
            cursor: crosshair;
            background-color: #ffffff;
        }

        .analysis-content h4 { 
            font-weight: 800; 
            color: #1e293b; 
            margin-top: 1.5rem; 
            margin-bottom: 0.75rem; 
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            padding-left: 0.75rem;
            border-left: 4px solid #0f172a;
        }
        .analysis-content p { margin-bottom: 1rem; line-height: 1.6; }
        .teacher-tag {
            display: inline-block;
            padding: 2px 10px;
            background: #0f172a;
            color: #ffffff;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-1">🎓 AI 數學導師</h1>
            <p class="text-slate-500 font-medium">使用 GLM-4.6V-Flash 多模態引擎</p>
        </header>

        <!-- Step 1: Question Generation -->
        <section class="bg-white rounded-3xl shadow-lg p-5 mb-6 border border-slate-100">
            <div class="flex flex-col gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">選擇難度</label>
                    <select id="topicSelect" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none cursor-pointer text-sm">
                        <option value="10以內的簡單加法">🟢 10以內簡單加法 (最易)</option>
                        <option value="20以內的加法應用題">🟡 20以內應用題 (初階)</option>
                        <option value="兩位數不進位加法">🟠 兩位數加法 (中階)</option>
                        <option value="簡單連加法 (三個數)">🔵 三個數連加 (進階)</option>
                    </select>
                </div>
                <button id="genBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold transition-all shadow-md flex items-center justify-center gap-2">
                    <span id="genBtnText">出題</span>
                    <div id="genLoader" class="loader hidden border-white border-t-transparent"></div>
                </button>
            </div>
            
            <div id="questionContainer" class="question-box rounded-xl p-6 min-h-[80px] flex flex-col items-center justify-center text-center text-slate-400 border border-slate-50">
                <p class="italic">請點擊「出題」</p>
            </div>
        </section>

        <!-- Step 2: Drawing Board -->
        <section id="analysisSection" class="bg-white rounded-3xl shadow-lg p-5 mb-6 border border-slate-100 opacity-50 pointer-events-none transition-all duration-500">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest">手寫計算區</h2>
                <button id="clearCanvas" class="text-xs font-bold text-red-500 hover:text-red-700 uppercase transition-colors">清除畫板</button>
            </div>

            <div id="canvasWrapper" class="relative bg-white border-2 border-slate-200 rounded-2xl overflow-hidden mb-6">
                <canvas id="drawingCanvas" width="800" height="450" class="w-full h-auto bg-white touch-none"></canvas>
            </div>

            <button id="analyzeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-3 active:scale-95">
                <span id="analyzeBtnText" class="text-base">提交批改</span>
                <div id="analyzeLoader" class="loader hidden border-white border-t-transparent"></div>
            </button>
        </section>

        <!-- Results -->
        <div id="resultArea" class="hidden bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden mb-20">
            <div class="bg-slate-900 px-6 py-4 flex justify-between items-center text-white">
                <h3 class="font-bold text-base">老師批改報告</h3>
                <button id="closeResult" class="opacity-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="analysisOutput" class="p-6 text-slate-700 analysis-content leading-relaxed text-sm md:text-base"></div>
        </div>
    </div>

    <script>
        // 設定 API Key (這裡請填寫您的智譜 AI Key)
        const apiKey = "272f193352024ce99416a7128bc499f6.QADLgmGclBxYOWYr"; 
        const glmEndpoint = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const genBtn = document.getElementById('genBtn');
        const topicSelect = document.getElementById('topicSelect');
        const genLoader = document.getElementById('genLoader');
        const questionContainer = document.getElementById('questionContainer');
        const analysisSection = document.getElementById('analysisSection');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const analyzeLoader = document.getElementById('analyzeLoader');
        const resultArea = document.getElementById('resultArea');
        const analysisOutput = document.getElementById('analysisOutput');
        
        let currentQuestion = "";
        let drawing = false;

        function performRender(el) {
            renderMathInElement(el, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            });
        }

        function initCanvas() {
            ctx.lineWidth = 6; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#1e293b';

            function getCoords(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            const startDrawing = (e) => { 
                drawing = true; 
                const { x, y } = getCoords(e);
                ctx.beginPath();
                ctx.moveTo(x, y);
                if (e.type === 'touchstart') e.preventDefault();
            };

            const draw = (e) => {
                if (!drawing) return;
                const { x, y } = getCoords(e);
                ctx.lineTo(x, y);
                ctx.stroke();
                if (e.type === 'touchmove') e.preventDefault();
            };

            const stopDrawing = () => { drawing = false; ctx.closePath(); };

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing, { passive: false });
        }

        // 修改後的 GLM 呼叫函數
        async function callGLM(prompt, base64Img = null) {
            let messages = [
                { 
                    role: "system", 
                    content: "你是一位親切的香港數學老師。請用繁體中文回覆。題目要極度簡單、文字少、數字小。不要使用 Markdown 符號如 ####。數學公式請用 LaTeX $ 包裹。排版要清晰美觀。" 
                }
            ];

            let userContent = [];
            if (base64Img) {
                // GLM-4V 多模態格式
                userContent.push({
                    type: "image_url",
                    image_url: { url: base64Img }
                });
            }
            userContent.push({ type: "text", text: prompt });
            
            messages.push({ role: "user", content: userContent });

            const response = await fetch(glmEndpoint, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "glm-4.6v-flash",
                    messages: messages,
                    temperature: 0.2,
                    top_p: 0.7
                })
            });

            if (!response.ok) throw new Error("API 請求失敗");
            const data = await response.json();
            return data.choices[0].message.content;
        }

        genBtn.addEventListener('click', async () => {
            genBtn.disabled = true;
            genLoader.classList.remove('hidden');
            questionContainer.innerHTML = `<div class="loader !border-slate-200 border-t-slate-800"></div>`;
            
            const prompt = `請出一題關於「${topicSelect.value}」的題目。要求：數字小，文字少於15字。`;

            try {
                const content = await callGLM(prompt);
                currentQuestion = content;
                questionContainer.innerHTML = `<div class="text-xl font-bold text-slate-800">${content}</div>`;
                analysisSection.classList.remove('opacity-50', 'pointer-events-none');
                performRender(questionContainer);
            } catch (e) {
                questionContainer.innerText = "連線失敗，請檢查 API Key 或網路環境";
            } finally {
                genBtn.disabled = false;
                genLoader.classList.add('hidden');
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            const imageData = canvas.toDataURL('image/png');
            analyzeBtn.disabled = true;
            analyzeLoader.classList.remove('hidden');
            resultArea.classList.remove('hidden');
            analysisOutput.innerHTML = `<p class="text-center py-6 text-slate-400 animate-pulse">老師正在批改您的算式...</p>`;
            resultArea.scrollIntoView({ behavior: 'smooth' });

            const prompt = `這是學生對題目「${currentQuestion}」的手寫解答圖片。請批改此算式。
            1. 先判斷對錯。
            2. 使用 LaTeX 的 align* 環境給出極簡解答。
            3. 確保不要輸出 #### 等標記符號。`;

            try {
                const res = await callGLM(prompt, imageData);
                const cleanOutput = res
                    .split('\n').map(line => {
                        if (line.includes('對') || line.includes('錯') || line.includes('解答') || line.includes('建議') || line.includes('正確')) {
                            return `<h4><span class="teacher-tag">老師</span> ${line.trim()}</h4>`;
                        }
                        return line;
                    }).join('\n')
                    .replace(/\n/g, '<br>');
                
                analysisOutput.innerHTML = cleanOutput;
                setTimeout(() => performRender(analysisOutput), 50);
            } catch (e) {
                analysisOutput.innerText = "批改失敗，請稍後再試。";
            } finally {
                analyzeBtn.disabled = false;
                analyzeLoader.classList.add('hidden');
            }
        });

        document.getElementById('clearCanvas').addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
        document.getElementById('closeResult').addEventListener('click', () => {
            resultArea.classList.add('hidden');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        window.onload = () => { initCanvas(); performRender(document.body); };
    </script>
</body>
</html>
