<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會計溫習助手 Pro V15 - 完整核心版</title>
    <style>
        :root {
            --primary: #2c3e50; --ratio: #27ae60; --limit: #16a085; --f-limit: #d35400; --principle: #8e44ad; --error: #e67e22; --entry: #c0392b; --note: #2980b9; --bg: #f4f7f6;
        }
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; }
        .main-menu { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
        .menu-btn { padding: 18px; border: none; border-radius: 12px; color: white; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-align: left; display: flex; align-items: center; justify-content: space-between; }
        .sub-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .back-btn { background: #34495e; grid-column: 1 / -1; margin-top: 10px; justify-content: center; }
        .content-box { margin-top: 15px; width: 100%; }
        .card-container { perspective: 1000px; width: 100%; height: 350px; cursor: pointer; }
        .card { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; box-sizing: border-box; border-radius: 20px; background: white; }
        .card-back { transform: rotateY(180deg); color: white; font-weight: bold; }
        .study-list-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .study-q { font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .study-a { font-size: 0.95rem; color: #444; line-height: 1.5; white-space: pre-line; }
        .quiz-container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; text-align: left; background: white; font-size: 0.95rem; cursor: pointer; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); font-size: 1.4rem; margin-bottom: 5px; text-align: center; }
        .tag { font-size: 0.75rem; background: rgba(0,0,0,0.05); padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>會計溫習助手 V15 (完整核心版)</h1>
            <p style="text-align:center; font-size:0.8rem; color:var(--principle);">已補齊所有會計原則與報表局限</p>
        </header>

        <div id="main-nav" class="main-menu">
            <button class="menu-btn" style="background: var(--principle);" onclick="enterTopic('principle')">📜 會計原則 (10大核心項目)</button>
            <button class="menu-btn" style="background: var(--error);" onclick="enterTopic('error')">⚠️ 錯誤更正 (7大類型)</button>
            <button class="menu-btn" style="background: var(--ratio);" onclick="enterTopic('ratio')">📊 會計比率 (所有公式)</button>
            <button class="menu-btn" style="background: var(--entry);" onclick="enterTopic('entry')">📓 重要會計分錄 (2025標準)</button>
            <button class="menu-btn" style="background: var(--limit);" onclick="enterTopic('ratioLimit')">💡 會計比率的限制</button>
            <button class="menu-btn" style="background: var(--f-limit);" onclick="enterTopic('fLimit')">📉 財務報表局限</button>
        </div>

        <div id="sub-nav" class="sub-menu hidden">
            <h2 id="current-topic-name" style="grid-column: 1/-1; text-align: center; color: var(--primary); font-size: 1.2rem;"></h2>
            <button class="menu-btn" style="background: #34495e; justify-content:center;" onclick="startMode('study')">📖 1. 溫習清單</button>
            <button class="menu-btn" style="background: #34495e; justify-content:center;" onclick="startMode('flash')">🗂️ 2. 閃卡溫習</button>
            <button class="menu-btn" style="background: #34495e; justify-content:center; grid-column: 1/-1;" onclick="startMode('mc')">✍️ 3. MC 測試</button>
            <button class="menu-btn back-btn" onclick="goHome()">⬅ 返回主目錄</button>
        </div>

        <div id="content-area" class="content-box hidden">
            <div id="study-mode" class="hidden"><div id="study-list-content"></div></div>
            <div id="flash-mode" class="hidden">
                <div class="card-container" onclick="this.querySelector('.card').classList.toggle('flipped')">
                    <div class="card" id="main-card">
                        <div class="card-front"><span class="tag">題目</span><div id="q-text" style="font-weight:bold; line-height:1.4;"></div></div>
                        <div class="card-back" id="card-back-bg"><span class="tag" style="background:rgba(255,255,255,0.2); color:white;">定義/答案</span><div id="a-text" style="white-space: pre-line;"></div></div>
                    </div>
                </div>
                <div style="display:flex; justify-content: space-between; margin-top: 20px;">
                    <button class="menu-btn" style="background:#bdc3c7; width:45%; padding:15px; justify-content:center;" onclick="changeCard(-1)">上一個</button>
                    <button class="menu-btn" style="background:var(--primary); width:45%; padding:15px; justify-content:center;" onclick="changeCard(1)">下一個</button>
                </div>
            </div>
            <div id="mc-mode" class="hidden">
                <div class="quiz-container">
                    <div id="mc-q" style="font-weight:bold; margin-bottom:15px;"></div>
                    <div id="mc-options"></div>
                    <div id="mc-fb" style="display:none; padding:15px; border-radius:10px; margin-top:15px; font-weight:bold;"></div>
                    <button id="mc-next" class="menu-btn hidden" style="background:var(--primary); width:100%; margin-top:10px; justify-content:center;" onclick="generateMC()">下一題</button>
                </div>
            </div>
            <button class="menu-btn back-btn" onclick="exitToSubNav()">⬅ 返回模式選擇</button>
        </div>
    </div>

    <script>
        const appData = {
            principle: { title: "會計原則", color: "#8e44ad", items: [
                { q: "應計觀念 (Accrual Concept)", a: "收入與費用應在發生時（而非收付現金時）記錄於該會計期間。" },
                { q: "穩健保守 (Prudence)", a: "不預計利益，但預計所有潛在損失。低估資產/收益，高估負債/費用。" },
                { q: "配合原則 (Matching Principle)", a: "當期收入必須與產生該收入的費用在同一期間內相抵，以計算正確損益。" },
                { q: "企業個體 (Business Entity)", a: "企業被視為獨立於業主的法律個體，業主個人帳目不可與企業帳目混淆。" },
                { q: "持續經營 (Going Concern)", a: "假設企業將在可預見的未來繼續營運，資產按歷史成本而非清盤價入帳。" },
                { q: "歷史成本 (Historical Cost)", a: "資產應按購買時的實際成本入帳，而不論目前的市場價值如何變化。" },
                { q: "重大性 (Materiality)", a: "微小金額或不重要的項目可簡化處理（如垃圾桶直接列費用而非資產），除非會影響決策。" },
                { q: "一貫性 (Consistency)", a: "會計方法（如折舊法）一旦選定，各年度應保持一致，以便進行比較。" },
                { q: "貨幣衡量 (Money Measurement)", a: "只有能用貨幣表達的交易才能入帳，非金錢資訊（如員工素質）不列入報表。" },
                { q: "變現原則 (Realisation)", a: "收入應在交易完成、貨物或服務已交付且客戶有義務付款時認列。" }
            ]},
            error: { title: "錯誤更正類型", color: "#e67e22", items: [
                { q: "遺漏錯誤", a: "一項交易完全沒有在帳簿中記錄。" },
                { q: "帳名調亂", a: "入錯了相同類別的帳戶。" },
                { q: "原則性錯誤", a: "入錯了不同類別的帳戶（資產變費用）。" },
                { q: "原始分錄錯誤", a: "日記簿原始金額出錯，借貸雙方都入錯了相同錯額。" },
                { q: "重複錯誤", a: "同一項交易重複入帳兩次。" },
                { q: "顛倒入帳錯誤", a: "借貸方向完全相反（借貸位移）。" },
                { q: "抵銷性錯誤", a: "多個錯誤金額剛好互相抵銷，試算表仍平衡。" }
            ]},
            ratio: { title: "會計比率公式", color: "#27ae60", items: [
                { q: "加成 (Mark-up)", a: "(毛利 / 銷貨成本) x 100%" },
                { q: "毛利率 (Margin)", a: "(毛利 / 銷貨) x 100%" },
                { q: "運用資金報酬率", a: "(利息及稅前淨利 / 平均運用資金) x 100%" },
                { q: "速動比率", a: "(流動資產 - 存貨) : 流動負債" },
                { q: "槓桿比率", a: "(非流動負債 + 優先股本) / (非流動負債 + 股東資本) x 100%" },
                { q: "市盈率 (P/E)", a: "每股普通股市價 / 每股盈利" }
            ]},
            entry: { title: "重要分錄", color: "#c0392b", items: [
                { q: "註銷壞帳 (備抵法)", a: "借：呆帳準備\n貸：應收貨款" },
                { q: "呆帳準備增加", a: "借：壞帳 (費用)\n貸：呆帳準備" },
                { q: "提用貨物", a: "借：提用\n貸：購貨" },
                { q: "發出免費貨物樣本", a: "借：推廣費用\n貸：購貨" }
            ]},
            ratioLimit: { title: "會計比率限制", color: "#16a085", items: [
                { q: "資訊滯後", a: "會計信息來自過去成果，對預測未來發展無關。" },
                { q: "通脹誤導", a: "基於歷史成本，沒有理會通脹影響。" },
                { q: "忽略質性", a: "忽略公司管治、客戶忠誠和員工士氣。" }
            ]},
            fLimit: { title: "財務報表局限", color: "#d35400", items: [
                { q: "量化限制", a: "資料大都是量化的，難以反映產品質量等質素。" },
                { q: "歷史性", a: "數據只與過往事件有關。" },
                { q: "對比困難", a: "不同公司使用不同會計方法（如折舊）增加對比難度。" },
                { q: "金錢時間值", a: "忽視金錢時間值，難以作精確跨年度對比。" }
            ]}
        };

        let currentTopic = ''; let currentIdx = 0;

        function enterTopic(t) {
            currentTopic = t;
            document.getElementById('main-nav').classList.add('hidden');
            document.getElementById('sub-nav').classList.remove('hidden');
            document.getElementById('current-topic-name').innerText = appData[t].title;
        }

        function goHome() { document.getElementById('sub-nav').classList.add('hidden'); document.getElementById('main-nav').classList.remove('hidden'); }
        function exitToSubNav() { document.getElementById('content-area').classList.add('hidden'); document.getElementById('sub-nav').classList.remove('hidden'); }

        function startMode(m) {
            document.getElementById('sub-nav').classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');
            document.getElementById('study-mode').classList.toggle('hidden', m !== 'study');
            document.getElementById('flash-mode').classList.toggle('hidden', m !== 'flash');
            document.getElementById('mc-mode').classList.toggle('hidden', m !== 'mc');
            if (m === 'study') renderStudy(); else if (m === 'flash') { currentIdx = 0; updateFlash(); } else generateMC();
        }

        function renderStudy() {
            document.getElementById('study-list-content').innerHTML = appData[currentTopic].items.map(i => `
                <div class="study-list-item" style="border-left-color:${appData[currentTopic].color}">
                    <div class="study-q">${i.q}</div>
                    <div class="study-a">${i.a}</div>
                </div>
            `).join('');
        }

        function updateFlash() {
            const item = appData[currentTopic].items[currentIdx];
            document.getElementById('q-text').innerText = item.q;
            document.getElementById('a-text').innerText = item.a;
            document.getElementById('card-back-bg').style.background = appData[currentTopic].color;
            document.getElementById('main-card').classList.remove('flipped');
        }

        function changeCard(d) {
            const len = appData[currentTopic].items.length;
            currentIdx = (currentIdx + d + len) % len;
            updateFlash();
        }

        function generateMC() {
            const items = appData[currentTopic].items;
            const item = items[Math.floor(Math.random() * items.length)];
            const fb = document.getElementById('mc-fb'); fb.style.display = 'none';
            document.getElementById('mc-next').classList.add('hidden');
            let others = items.filter(i => i.a !== item.a).map(i => i.a);
            others = [...new Set(others)].sort(() => Math.random() - 0.5).slice(0, 2);
            const choices = [item.a, ...others].sort(() => Math.random() - 0.5);
            document.getElementById('mc-q').innerText = `題目：${item.q}`;
            const optArea = document.getElementById('mc-options'); optArea.innerHTML = '';
            choices.forEach(text => {
                const b = document.createElement('div'); b.className = 'option';
                b.innerText = text;
                b.onclick = () => {
                    if (fb.style.display === 'none') {
                        fb.style.display = 'block';
                        if (text === item.a) { fb.innerHTML = "✅ 正確"; fb.style.color = "#27ae60"; }
                        else { fb.innerHTML = `❌ 錯誤。正確答案：<br>${item.a}`; fb.style.color = "#e74c3c"; }
                        document.getElementById('mc-next').classList.remove('hidden');
                    }
                };
                optArea.appendChild(b);
            });
        }
    </script>
</body>
</html>
